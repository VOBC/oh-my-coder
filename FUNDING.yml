# 支持这个项目

如果你觉得 Oh My Coder 对你有帮助，欢迎通过以下方式支持：

## ☕ 赞助商

- 如果你是个人开发者，可以通过 GitHub Sponsors 赞助
- 如果你是企业，可以通过 GitHub Sponsors 成为赞助商

## ⭐ 贡献代码

欢迎提交 Pull Request！请查看 [CONTRIBUTING.md](CONTRIBUTING.md)。

## 🐛 反馈问题

遇到 Bug？请 [提交 Issue](https://github.com/VOBC/oh-my-coder/issues/new/choose)。

## 📢 传播

- 给项目点个 ⭐
- 分享给需要的朋友
- 在社交媒体上提及

## 🙏 致谢

所有赞助商和贡献者都将在这里表示感谢！
