name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-asyncio
          pip install -r requirements.txt 2>/dev/null || pip install fastapi uvicorn pydantic httpx python-dotenv rich typer
      
      - name: Run tests
        run: pytest tests/ -v --tb=short
