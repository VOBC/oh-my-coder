name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"

      - name: Run tests (fast, no coverage)
        if: matrix.python-version != '3.12'
        run: |
          python -m pytest tests/ -o "addopts=--tb=short -ra -q --strict-markers" --timeout=300 -n auto

      - name: Run tests with coverage (Python 3.12 only)
        if: matrix.python-version == '3.12'
        run: |
          python -m pytest tests/ --cov=src --cov-report=term-missing:skip-covered --cov-report=xml -o "addopts=--tb=short -ra -q --strict-markers" --timeout=300
