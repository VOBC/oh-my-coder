name: Test

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Run a simple test
        run: |
          pip install pytest
          python -c "print('Python works!')"
          python -c "import pytest; print('pytest installed')"
          pytest --version
