name: Lint
on: [push, pull_request]
permissions:
  contents: read
jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
      - run: pip install "ruff>=0.15.0"
      - run: ruff check . --exclude 'tests/*_extras.py' --exclude 'tests/test_share_*.py' --exclude 'tests/test_cli_template.py' --exclude 'tests/test_web_app_coverage_step5.py'
