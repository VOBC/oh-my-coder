<svg xmlns="http://www.w3.org/2000/svg" width="920" height="620" viewBox="0 0 920 620">
  <style>
    text { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; }
    .bg { fill: #1e1e2e; }
    .title { fill: #cdd6f4; font-size: 18px; font-weight: bold; }
    .cmd { fill: #a6e3a1; font-size: 12px; font-family: "SF Mono", "Fira Code", monospace; }
    .lane { fill: #89b4fa; font-size: 13px; font-weight: bold; }
    .agent { fill: #a6e3a1; font-size: 12px; font-family: "SF Mono", "Fira Code", monospace; }
    .desc { fill: #9399b2; font-size: 11px; }
    .stat-box { fill: #313244; stroke: #45475a; stroke-width: 1; }
    .stat-num { fill: #fab387; font-size: 22px; font-weight: bold; }
    .stat-label { fill: #a6adc8; font-size: 11px; }
    .divider { stroke: #585b70; stroke-width: 0.5; }
  </style>

  <!-- Background -->
  <rect width="920" height="620" rx="10" class="bg"/>

  <!-- Header (compact: one line) -->
  <text x="30" y="26" class="cmd">$ omc agents list</text>
  <text x="30" y="46" class="title">Oh My Coder — 31 个专业 Agent · Multi-Agent 协作编程框架</text>
  <line x1="30" y1="56" x2="890" y2="56" class="divider"/>

  <!-- ===== Build/Analysis Lane (9) ===== -->
  <text x="30" y="76" class="lane">▸ 构建 / 分析通道（9 个）</text>
  <text x="30" y="95"  class="agent">├─ ExploreAgent</text>       <text x="225" y="95"  class="desc">探索代码库结构，生成项目地图</text>
  <text x="30" y="112" class="agent">├─ AnalystAgent</text>       <text x="225" y="112" class="desc">分析需求和任务，发现隐藏约束</text>
  <text x="30" y="129" class="agent">├─ PlannerAgent</text>       <text x="225" y="129" class="desc">规划开发计划，制定执行步骤</text>
  <text x="30" y="146" class="agent">├─ ArchitectAgent</text>     <text x="225" y="146" class="desc">设计系统架构和技术选型</text>
  <text x="30" y="163" class="agent">├─ ExecutorAgent</text>      <text x="225" y="163" class="desc">执行代码生成，支持 14 种语言</text>
  <text x="30" y="180" class="agent">├─ VerifierAgent</text>      <text x="225" y="180" class="desc">验证代码正确性，运行测试</text>
  <text x="30" y="197" class="agent">├─ DebuggerAgent</text>      <text x="225" y="197" class="desc">调试和修复代码错误</text>
  <text x="30" y="214" class="agent">├─ TracerAgent</text>        <text x="225" y="214" class="desc">追踪代码执行流程，定位根因</text>
  <text x="30" y="231" class="agent">└─ PerformanceAgent</text>  <text x="225" y="231" class="desc">性能分析、瓶颈定位和优化建议</text>

  <line x1="30" y1="244" x2="890" y2="244" class="divider"/>

  <!-- ===== Review Lane (2) ===== -->
  <text x="30" y="262" class="lane">▸ 审查通道（2 个）</text>
  <text x="30" y="281" class="agent">├─ CodeReviewerAgent</text>     <text x="225" y="281" class="desc">代码质量审查，发现坏味道</text>
  <text x="30" y="298" class="agent">└─ SecurityReviewerAgent</text><text x="225" y="298" class="desc">代码安全审查，扫描漏洞</text>

  <line x1="30" y1="311" x2="890" y2="311" class="divider"/>

  <!-- ===== Domain Lane (16) ===== -->
  <text x="30" y="329" class="lane">▸ 领域通道（16 个）</text>
  <!-- Left column (8) -->
  <text x="30" y="348" class="agent">├─ TestEngineerAgent</text>   <text x="225" y="348" class="desc">生成单元测试和集成测试</text>
  <text x="30" y="365" class="agent">├─ DesignerAgent</text>       <text x="225" y="365" class="desc">界面和交互设计</text>
  <text x="30" y="382" class="agent">├─ VisionAgent</text>         <text x="225" y="382" class="desc">截图布局分析 + UI 代码自动生成</text>
  <text x="30" y="399" class="agent">├─ DocumentAgent</text>       <text x="225" y="399" class="desc">技术文档、API 参考、架构文档</text>
  <text x="30" y="416" class="agent">├─ WriterAgent</text>        <text x="225" y="416" class="desc">快速文档、README、注释生成</text>
  <text x="30" y="433" class="agent">├─ ScientistAgent</text>     <text x="225" y="433" class="desc">技术调研和可行性分析</text>
  <text x="30" y="450" class="agent">├─ GitMasterAgent</text>      <text x="225" y="450" class="desc">Git 操作自动化</text>
  <text x="30" y="467" class="agent">└─ CodeSimplifierAgent</text><text x="225" y="467" class="desc">代码简化优化</text>
  <!-- Right column (8) -->
  <text x="460" y="348" class="agent">├─ QATesterAgent</text>       <text x="660" y="348" class="desc">QA 测试和质量验证</text>
  <text x="460" y="365" class="agent">├─ DatabaseAgent</text>      <text x="660" y="365" class="desc">数据库设计、SQL 优化和迁移</text>
  <text x="460" y="382" class="agent">├─ APIAgent</text>           <text x="660" y="382" class="desc">REST API 设计、接口规范和文档</text>
  <text x="460" y="399" class="agent">├─ DevOpsAgent</text>        <text x="660" y="399" class="desc">CI/CD 流水线、容器化和部署</text>
  <text x="460" y="416" class="agent">├─ UMLAgent</text>           <text x="660" y="416" class="desc">UML 图表生成（类图/时序图/流程图）</text>
  <text x="460" y="433" class="agent">├─ MigrationAgent</text>     <text x="660" y="433" class="desc">代码迁移、框架升级和技术债清理</text>
  <text x="460" y="450" class="agent">├─ AuthAgent</text>          <text x="660" y="450" class="desc">认证授权设计、安全策略审查</text>
  <text x="460" y="467" class="agent">└─ DataAgent</text>          <text x="660" y="467" class="desc">数据处理、ETL 流程和数据质量</text>

  <line x1="30" y1="480" x2="890" y2="480" class="divider"/>

  <!-- ===== Coordination Lane (4) ===== -->
  <text x="30" y="498" class="lane">▸ 协调通道（4 个）</text>
  <text x="30" y="517" class="agent">├─ SkillManageAgent</text>  <text x="225" y="517" class="desc">Skill 管理和自进化、经验沉淀</text>
  <text x="460" y="517" class="agent">├─ PromptAgent</text>       <text x="660" y="517" class="desc">Prompt 工程优化和模板管理</text>
  <text x="30" y="534" class="agent">├─ SelfImprovingAgent</text><text x="225" y="534" class="desc">从执行结果中学习，优化路由策略</text>
  <text x="460" y="534" class="agent">└─ CriticAgent</text>       <text x="660" y="534" class="desc">审查计划和设计，提供改进建议</text>

  <!-- Stats panel -->
  <rect x="680" y="62" width="200" height="180" rx="8" class="stat-box"/>
  <text x="780" y="83" text-anchor="middle" class="stat-label">AGENT 总数</text>
  <text x="780" y="112" text-anchor="middle" class="stat-num">31</text>
  <text x="780" y="131" text-anchor="middle" class="stat-label">构建/分析 9 · 审查 2</text>
  <text x="780" y="148" text-anchor="middle" class="stat-label">领域 16 · 协调 4</text>
  <line x1="700" y1="159" x2="860" y2="159" stroke="#45475a" stroke-width="0.5"/>
  <text x="780" y="176" text-anchor="middle" class="stat-label">12 家国产模型</text>
  <text x="780" y="193" text-anchor="middle" class="stat-label">7 种工作流</text>
  <text x="780" y="210" text-anchor="middle" class="stat-label">MIT 开源</text>
</svg>
