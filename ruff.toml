line-length = 88
target-version = "py310"
lint.select = ["E", "F", "W", "I"]  # 暂时关闭 UP (pyupgrade)，避免大量类型注解修改
lint.ignore = [
    "E501",   # 行太长
    "E701",   # 一行多语句
    "B008",   # Typer/FastAPI: 函数默认参数中的调用是框架惯用法
    "B904",   # raise from: 覆盖面太大，逐个修复成本高
    "B905",   # zip() strict: 行为变更风险
    "N802",   # 函数名风格: 内部回调/路由函数
    "N805",   # 方法首参数: discord.Client 绕过
    "N806",   # 变量名: TraceContext 类引用
    "N815",   # 类变量大写
    "B027",   # 空抽象方法: 插件钩子
    "E402",   # 模块级 import: 条件导入/延迟导入
    "E722",   # bare except: 已知位置，低优先级
    "F841",   # 未使用变量: planner 中预留逻辑
    "F401",   # 未使用导入: ruff --fix 遗留
    "W293",   # 尾部空格: 测试模板文件
    "W292",   # 文件末尾无换行
    "B005",   # .strip() 多字符: 测试代码
    "I",      # import 排序（isort）
]
