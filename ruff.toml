line-length = 88
target-version = "py310"
lint.select = ["E", "F", "W", "I", "B", "N", "UP"]  # Phase 1: 开启全部规则
lint.ignore = [
    "E501",   # 行太长 — black 格式化处理
    "E701",   # 一行多语句 — 短语句惯用法
    "B008",   # Typer/FastAPI: 函数默认参数中的调用是框架惯用法
    "B904",   # raise from: 覆盖面太大，逐个修复成本高
    "N802",   # 函数名风格: 内部回调/路由函数
    "N805",   # 方法首参数: discord.Client 绕过
    "N806",   # 变量名: TraceContext 类引用
    "N815",   # 类变量大写
    "B027",   # 空抽象方法: 插件钩子
    "E402",   # 模块级 import: 条件导入/延迟导入
    "W293",   # 尾部空格: 模板文件
    "B005",   # .strip() 多字符: 测试代码
    "B023",   # 闭包捕获循环变量
    "F821",   # undefined-name: 自动修复引入
]
