<svg xmlns="http://www.w3.org/2000/svg" width="920" height="720" viewBox="0 0 920 720">
  <style>
    text { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; }
    .bg { fill: #1e1e2e; }
    .title { fill: #cdd6f4; font-size: 20px; font-weight: bold; }
    .subtitle { fill: #6c7086; font-size: 13px; }
    .cmd { fill: #a6e3a1; font-size: 13px; font-family: "SF Mono", "Fira Code", monospace; }
    .lane { fill: #89b4fa; font-size: 14px; font-weight: bold; }
    .agent { fill: #a6e3a1; font-size: 13px; font-family: "SF Mono", "Fira Code", monospace; }
    .desc { fill: #9399b2; font-size: 12px; }
    .stat-box { fill: #313244; stroke: #45475a; stroke-width: 1; }
    .stat-num { fill: #fab387; font-size: 24px; font-weight: bold; }
    .stat-label { fill: #a6adc8; font-size: 11px; }
    .divider { stroke: #585b70; stroke-width: 0.5; }
  </style>

  <!-- Background -->
  <rect width="920" height="720" rx="12" class="bg"/>

  <!-- Header -->
  <text x="30" y="32" class="cmd">$ omc agents list</text>
  <text x="30" y="58" class="title">Oh My Coder — 31 个专业 Agent</text>
  <text x="30" y="76" class="subtitle">Multi-Agent AI Coding Framework · 多 Agent 协作编程系统</text>
  <line x1="30" y1="88" x2="890" y2="88" class="divider"/>

  <!-- ===== Build/Analysis Lane (9) ===== -->
  <text x="30" y="112" class="lane">▸ 构建 / 分析通道（9 个）</text>
  <text x="30" y="134" class="agent">├─ ExploreAgent</text>       <text x="235" y="134" class="desc">探索代码库结构，生成项目地图</text>
  <text x="30" y="155" class="agent">├─ AnalystAgent</text>       <text x="235" y="155" class="desc">分析需求和任务，发现隐藏约束</text>
  <text x="30" y="176" class="agent">├─ PlannerAgent</text>       <text x="235" y="176" class="desc">规划开发计划，制定执行步骤</text>
  <text x="30" y="197" class="agent">├─ ArchitectAgent</text>     <text x="235" y="197" class="desc">设计系统架构和技术选型</text>
  <text x="30" y="218" class="agent">├─ ExecutorAgent</text>      <text x="235" y="218" class="desc">执行代码生成，支持 14 种语言</text>
  <text x="30" y="239" class="agent">├─ VerifierAgent</text>      <text x="235" y="239" class="desc">验证代码正确性，运行测试</text>
  <text x="30" y="260" class="agent">├─ DebuggerAgent</text>      <text x="235" y="260" class="desc">调试和修复代码错误</text>
  <text x="30" y="281" class="agent">├─ TracerAgent</text>        <text x="235" y="281" class="desc">追踪代码执行流程，定位根因</text>
  <text x="30" y="302" class="agent">└─ PerformanceAgent</text>   <text x="235" y="302" class="desc">性能分析、瓶颈定位和优化建议</text>

  <line x1="30" y1="318" x2="890" y2="318" class="divider"/>

  <!-- ===== Review Lane (2) ===== -->
  <text x="30" y="340" class="lane">▸ 审查通道（2 个）</text>
  <text x="30" y="362" class="agent">├─ CodeReviewerAgent</text>       <text x="235" y="362" class="desc">代码质量审查，发现坏味道</text>
  <text x="30" y="383" class="agent">└─ SecurityReviewerAgent</text>   <text x="235" y="383" class="desc">代码安全审查，扫描漏洞</text>

  <line x1="30" y1="399" x2="890" y2="399" class="divider"/>

  <!-- ===== Domain Lane (16) ===== -->
  <text x="30" y="421" class="lane">▸ 领域通道（16 个）</text>
  <!-- Left column (8) -->
  <text x="30" y="443" class="agent">├─ TestEngineerAgent</text>   <text x="235" y="443" class="desc">生成单元测试和集成测试</text>
  <text x="30" y="463" class="agent">├─ DesignerAgent</text>       <text x="235" y="463" class="desc">界面和交互设计</text>
  <text x="30" y="483" class="agent">├─ VisionAgent</text>         <text x="235" y="483" class="desc">截图布局分析 + UI 代码自动生成</text>
  <text x="30" y="503" class="agent">├─ DocumentAgent</text>      <text x="235" y="503" class="desc">技术文档、API 参考、架构文档</text>
  <text x="30" y="523" class="agent">├─ WriterAgent</text>        <text x="235" y="523" class="desc">快速文档、README、注释生成</text>
  <text x="30" y="543" class="agent">├─ ScientistAgent</text>      <text x="235" y="543" class="desc">技术调研和可行性分析</text>
  <text x="30" y="563" class="agent">├─ GitMasterAgent</text>      <text x="235" y="563" class="desc">Git 操作自动化</text>
  <text x="30" y="583" class="agent">└─ CodeSimplifierAgent</text><text x="235" y="583" class="desc">代码简化优化</text>
  <!-- Right column (8) -->
  <text x="460" y="443" class="agent">├─ QATesterAgent</text>       <text x="660" y="443" class="desc">QA 测试和质量验证</text>
  <text x="460" y="463" class="agent">├─ DatabaseAgent</text>      <text x="660" y="463" class="desc">数据库设计、SQL 优化和迁移</text>
  <text x="460" y="483" class="agent">├─ APIAgent</text>           <text x="660" y="483" class="desc">REST API 设计、接口规范和文档</text>
  <text x="460" y="503" class="agent">├─ DevOpsAgent</text>        <text x="660" y="503" class="desc">CI/CD 流水线、容器化和部署</text>
  <text x="460" y="523" class="agent">├─ UMLAgent</text>           <text x="660" y="523" class="desc">UML 图表生成（类图/时序图/流程图）</text>
  <text x="460" y="543" class="agent">├─ MigrationAgent</text>    <text x="660" y="543" class="desc">代码迁移、框架升级和技术债清理</text>
  <text x="460" y="563" class="agent">├─ AuthAgent</text>          <text x="660" y="563" class="desc">认证授权设计、安全策略审查</text>
  <text x="460" y="583" class="agent">└─ DataAgent</text>          <text x="660" y="583" class="desc">数据处理、ETL 流程和数据质量</text>

  <line x1="30" y1="599" x2="890" y2="599" class="divider"/>

  <!-- ===== Coordination Lane (4) ===== -->
  <text x="30" y="621" class="lane">▸ 协调通道（4 个）</text>
  <text x="30" y="643" class="agent">├─ SkillManageAgent</text>  <text x="235" y="643" class="desc">Skill 管理和自进化、经验沉淀</text>
  <text x="460" y="643" class="agent">├─ PromptAgent</text>       <text x="660" y="643" class="desc">Prompt 工程优化和模板管理</text>
  <text x="30" y="663" class="agent">├─ SelfImprovingAgent</text><text x="235" y="663" class="desc">从执行结果中学习，优化路由策略</text>
  <text x="460" y="663" class="agent">└─ CriticAgent</text>       <text x="660" y="663" class="desc">审查计划和设计，提供改进建议</text>

  <!-- Stats panel -->
  <rect x="680" y="96" width="200" height="200" rx="8" class="stat-box"/>
  <text x="780" y="120" text-anchor="middle" class="stat-label">AGENT 总数</text>
  <text x="780" y="152" text-anchor="middle" class="stat-num">31</text>
  <text x="780" y="173" text-anchor="middle" class="stat-label">构建/分析 9 · 审查 2</text>
  <text x="780" y="191" text-anchor="middle" class="stat-label">领域 16 · 协调 4</text>
  <line x1="700" y1="203" x2="860" y2="203" stroke="#45475a" stroke-width="0.5"/>
  <text x="780" y="222" text-anchor="middle" class="stat-label">12 家国产模型</text>
  <text x="780" y="241" text-anchor="middle" class="stat-label">7 种工作流</text>
  <text x="780" y="260" text-anchor="middle" class="stat-label">MIT 开源</text>
</svg>
